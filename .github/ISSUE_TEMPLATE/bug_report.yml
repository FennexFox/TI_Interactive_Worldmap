name: Bug report
description: Report incorrect map rendering, data matching, or UI behavior.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: Example: Claim data is missing after selecting a specific nation.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Open the page.
        2. Select ...
        3. Click ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Choose the closest area for this issue.
      options:
        - Map rendering
        - Nation or region data
        - Claim or project data
        - Search, filters, or language UI
        - Build or deployed output
        - Other
    validations:
      required: false
  - type: textarea
    id: data_context
    attributes:
      label: Data context
      description: Note relevant Terra Invicta version, template file, generated data file, region, nation, or project.
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Evidence
      description: Add screenshots, console output, links, or manual verification notes if available.
    validations:
      required: false
